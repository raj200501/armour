<svg xmlns="http://www.w3.org/2000/svg" width="920" height="310" viewBox="0 0 920 310" role="img" aria-labelledby="title desc">
  <title id="title">Outcome-state breakdown</title>
  <desc id="desc">Bar chart showing succeeded, denied, and attempted-only risky action findings.</desc>
  <rect width="920" height="310" fill="#ffffff"/>
  <text x="40" y="46" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Risky Action Outcome State</text>
  <text x="40" y="76" fill="#4b5563" font-family="Inter, Arial, sans-serif" font-size="14">Risky trace evidence is separated by whether the action succeeded, was denied, or was attempted only.</text>
  <line x1="120" y1="250" x2="850" y2="250" stroke="#d1d5db" stroke-width="1"/>
  <line x1="120" y1="105" x2="120" y2="250" stroke="#d1d5db" stroke-width="1"/>
  <text x="92" y="254" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="12">0</text>
  <text x="86" y="181" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="12">5</text>
  <text x="80" y="109" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="12">10</text>
  <line x1="120" y1="177.5" x2="850" y2="177.5" stroke="#eef2f7" stroke-width="1"/>
  <line x1="120" y1="105" x2="850" y2="105" stroke="#eef2f7" stroke-width="1"/>
  <rect x="190" y="105" width="120" height="145" rx="4" fill="#b91c1c"/>
  <rect x="400" y="206.5" width="120" height="43.5" rx="4" fill="#c2410c"/>
  <rect x="610" y="221" width="120" height="29" rx="4" fill="#7c3aed"/>
  <text x="231" y="96" fill="#991b1b" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">10</text>
  <text x="452" y="198" fill="#9a3412" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">3</text>
  <text x="663" y="213" fill="#6d28d9" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">2</text>
  <text x="207" y="275" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="14">Succeeded</text>
  <text x="437" y="275" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="14">Denied</text>
  <text x="624" y="275" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="14">Attempted only</text>
</svg>
