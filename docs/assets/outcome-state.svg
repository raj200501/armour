<svg xmlns="http://www.w3.org/2000/svg" width="920" height="390" viewBox="0 0 920 390" role="img" aria-labelledby="title desc">
  <title id="title">Risky action outcome state</title>
  <desc id="desc">Horizontal bar chart showing succeeded, denied, and attempted-only risky action findings.</desc>
  <rect width="920" height="390" fill="#ffffff"/>

  <text x="40" y="46" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">Risky Action Outcome State</text>
  <text x="40" y="76" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15">Risky tool calls are split by realized impact.</text>
  <text x="40" y="99" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="15">This separates unsafe intent from completed external effects.</text>

  <line x1="250" y1="318" x2="790" y2="318" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="250" y1="130" x2="250" y2="318" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="475" y1="130" x2="475" y2="318" stroke="#edf2f7" stroke-width="1"/>
  <line x1="700" y1="130" x2="700" y2="318" stroke="#edf2f7" stroke-width="1"/>
  <line x1="790" y1="130" x2="790" y2="318" stroke="#edf2f7" stroke-width="1"/>

  <text x="246" y="340" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="12">0</text>
  <text x="469" y="340" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="12">5</text>
  <text x="691" y="340" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="12">10</text>
  <text x="781" y="340" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="12">12</text>

  <text x="40" y="161" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Succeeded external effect</text>
  <text x="40" y="222" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Denied by tool or policy</text>
  <text x="40" y="283" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Attempted only</text>

  <rect x="250" y="139" width="450" height="34" rx="5" fill="#b91c1c"/>
  <rect x="250" y="200" width="135" height="34" rx="5" fill="#c2410c"/>
  <rect x="250" y="261" width="90" height="34" rx="5" fill="#334155"/>

  <text x="714" y="162" fill="#7f1d1d" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">10</text>
  <text x="399" y="223" fill="#9a3412" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">3</text>
  <text x="354" y="284" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">2</text>
</svg>
